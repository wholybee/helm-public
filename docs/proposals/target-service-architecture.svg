<svg xmlns="http://www.w3.org/2000/svg" width="1340" height="980" viewBox="0 0 1340 980" role="img" aria-labelledby="title desc">
  <title id="title">Helm OpenCPN C++ target service architecture</title>
  <desc id="desc">Target service diagram showing thin clients, a C++ gateway, C++ OpenCPN-native services, hardware inputs, and public OpenCPN source anchors.</desc>
  <defs>
    <style>
      text { font-family: Arial, Helvetica, sans-serif; fill: #172026; }
      .title { font-size: 28px; font-weight: 700; }
      .subtitle { font-size: 15px; fill: #42525c; }
      .box { fill: #f7faf9; stroke: #6f8f8a; stroke-width: 1.5; }
      .core { fill: #eaf4ff; stroke: #2b6cb0; stroke-width: 2; }
      .hard { fill: #fff3e6; stroke: #b7791f; stroke-width: 2; }
      .client { fill: #eef7ee; stroke: #3f8f5f; stroke-width: 1.6; }
      .anchor { fill: #f3f0ff; stroke: #6b46c1; stroke-width: 1.4; }
      .label { font-size: 17px; font-weight: 700; }
      .small { font-size: 13px; fill: #4b5c66; }
      .tiny { font-size: 12px; fill: #596a73; }
      .arrow { stroke: #2d3a42; stroke-width: 2; fill: none; marker-end: url(#arrow); }
      .soft { stroke: #82929a; stroke-width: 1.6; fill: none; marker-end: url(#arrow-soft); }
    </style>
    <marker id="arrow" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="7" markerHeight="7" orient="auto-start-reverse">
      <path d="M0 0 L10 5 L0 10 z" fill="#2d3a42"/>
    </marker>
    <marker id="arrow-soft" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="6" markerHeight="6" orient="auto-start-reverse">
      <path d="M0 0 L10 5 L0 10 z" fill="#82929a"/>
    </marker>
  </defs>

  <rect x="0" y="0" width="1340" height="980" fill="#ffffff"/>
  <text x="54" y="58" class="title">Helm/OpenCPN C++ Target Service Architecture</text>
  <text x="54" y="84" class="subtitle">Required boat-side runtime is C++/CMake/OpenCPN-native. Service boundary first; separate process when the contract is stable.</text>

  <rect x="70" y="125" width="1200" height="88" rx="8" class="client"/>
  <text x="92" y="160" class="label">Thin Clients</text>
  <text x="92" y="184" class="small">Browser cockpit / iPad / native client / test harnesses consume HTTP, WebSocket, tiles, bundles, and inspection contracts.</text>

  <path class="arrow" d="M670 213 L670 260"/>
  <rect x="455" y="260" width="430" height="86" rx="8" class="core"/>
  <text x="480" y="296" class="label">helm-gateway</text>
  <text x="480" y="320" class="small">C++ one-origin TLS, pairing, auth, static client, routing, common health</text>

  <path class="arrow" d="M670 346 L670 392"/>
  <rect x="60" y="392" width="1220" height="240" rx="10" class="box"/>
  <text x="86" y="424" class="label">C++ Boat Runtime Services</text>
  <text x="86" y="448" class="small">Names are target boundaries. Some may remain in one process until extraction is justified.</text>

  <rect x="88" y="480" width="205" height="110" rx="8" class="core"/>
  <text x="108" y="512" class="label">helm-navd</text>
  <text x="108" y="536" class="small">OpenCPN model</text>
  <text x="108" y="556" class="small">routes / AIS / ownship</text>
  <text x="108" y="576" class="small">alarms / pilot status</text>

  <rect x="315" y="480" width="205" height="110" rx="8" class="hard"/>
  <text x="335" y="512" class="label">helm-chartd</text>
  <text x="335" y="536" class="small">Chart DB + S-57/S-52</text>
  <text x="335" y="556" class="small">tiles / catalog / query</text>
  <text x="335" y="576" class="small">presentation authority</text>

  <rect x="542" y="480" width="205" height="110" rx="8" class="core"/>
  <text x="562" y="512" class="label">helm-packd</text>
  <text x="562" y="536" class="small">local packages</text>
  <text x="562" y="556" class="small">catalog / layers</text>
  <text x="562" y="576" class="small">prefetch / bundle</text>

  <rect x="769" y="480" width="205" height="110" rx="8" class="core"/>
  <text x="789" y="512" class="label">helm-envd</text>
  <text x="789" y="536" class="small">environment bundles</text>
  <text x="789" y="556" class="small">field tiles</text>
  <text x="789" y="576" class="small">valid-time replay</text>

  <rect x="996" y="480" width="205" height="110" rx="8" class="core"/>
  <text x="1016" y="512" class="label">helm-layerd</text>
  <text x="1016" y="536" class="small">user / overlay layers</text>
  <text x="1016" y="556" class="small">metadata / provenance</text>
  <text x="1016" y="576" class="small">inspection envelopes</text>

  <path class="soft" d="M418 590 L418 680"/>
  <path class="soft" d="M645 590 L645 680"/>
  <path class="soft" d="M872 590 L872 680"/>
  <path class="soft" d="M1098 590 L1098 680"/>

  <rect x="250" y="680" width="265" height="92" rx="8" class="hard"/>
  <text x="272" y="715" class="label">helm-renderd</text>
  <text x="272" y="738" class="small">neutral render model</text>
  <text x="272" y="758" class="small">draw-only backend contract</text>

  <rect x="540" y="680" width="265" height="92" rx="8" class="core"/>
  <text x="562" y="715" class="label">helm-cache</text>
  <text x="562" y="738" class="small">rebuildable GPU/tile artifacts</text>
  <text x="562" y="758" class="small">cache/proxy behavior</text>

  <rect x="830" y="680" width="265" height="92" rx="8" class="core"/>
  <text x="852" y="715" class="label">helm-inspectd</text>
  <text x="852" y="738" class="small">source-to-render trace</text>
  <text x="852" y="758" class="small">object / pixel provenance</text>

  <path class="arrow" d="M190 590 L190 830"/>
  <rect x="70" y="830" width="245" height="88" rx="8" class="box"/>
  <text x="92" y="864" class="label">Hardware Inputs</text>
  <text x="92" y="888" class="small">NMEA 0183 / NMEA 2000</text>
  <text x="92" y="906" class="small">Signal K / AIS / GPS / depth</text>

  <rect x="370" y="825" width="880" height="100" rx="8" class="anchor"/>
  <text x="394" y="858" class="label">Public OpenCPN Source Anchors</text>
  <text x="394" y="883" class="small">model/: comms, AIS, routes, tracks, ownship, nav objects, notifications, local APIs</text>
  <text x="394" y="903" class="small">gui/include/gui + s57 + data/s57data: chart DB, S-57/S-52, quilting, canvas, presentation assets</text>
  <text x="394" y="923" class="small">include/ocpn_plugin.h + cli/: plugin data-flow contracts and bounded headless proof slices</text>

  <rect x="72" y="940" width="1190" height="28" rx="6" fill="#fff8e8" stroke="#d69e2e"/>
  <text x="92" y="959" class="tiny">Hard boundary: helm-chartd/presentation owns official chart portrayal. Renderers, caches, symbols, overlays, and clients do not choose official chart semantics.</text>
</svg>
